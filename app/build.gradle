plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.bigoguardian'
    compileSdk 34

    defaultConfig {
        applicationId "com.example.bigoguardian"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17"
                abiFilters 'arm64-v8a'
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
        }
    }
}
