name: Build FFmpeg Sakti Bigo

on:
  workflow_dispatch: 

jobs:
  build-ffmpeg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c

      - name: Build FFmpeg via Android Maker
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential nasm yasm cmake ninja-build pkg-config autoconf libtool
          
          git clone https://github.com/Javernaut/ffmpeg-android-maker.git
          cd ffmpeg-android-maker
          
          # JURUS HACK 1: Hapus aturan "--disable-programs" agar file ffmpeg binary ikut dirakit
          sed -i 's/--disable-programs//g' scripts/ffmpeg/build.sh
          
          export ANDROID_SDK_HOME=/usr/local/lib/android/sdk
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}
          
          ./ffmpeg-android-maker.sh \
            --target-abis=arm64-v8a \
            --enable-openssl \
            --enable-gpl \
            --enable-libx264 \
            --enable-libx265
            
          # JURUS HACK 2: Ambil file ffmpeg dari dapur belakang, taruh ke etalase output
          mkdir -p output/bin/arm64-v8a
          cp build/ffmpeg/arm64-v8a/output/bin/ffmpeg output/bin/arm64-v8a/

      - name: Upload Pasukan Badak & Kunci Kontak Lengkap
        uses: actions/upload-artifact@v4
        with:
          name: pasukan-badak-bigo
          # JURUS HACK 3: Buka 2 pintu jaring sekaligus (Pintu lib dan Pintu bin)
          path: |
            ffmpeg-android-maker/output/lib/arm64-v8a/*.so
            ffmpeg-android-maker/output/bin/arm64-v8a/ffmpeg
          if-no-files-found: error
