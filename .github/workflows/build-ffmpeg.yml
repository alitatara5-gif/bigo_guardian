name: Build FFmpeg Sakti Bigo

on:
  workflow_dispatch: 

jobs:
  build-ffmpeg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Langkah tambahan: Pasang NDK yang pas
      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c # Versi stabil untuk FFmpeg

      - name: Build FFmpeg via Android Maker
        env:
          # Kita kasih tahu script-nya lokasi SDK & NDK di server GitHub
          ANDROID_SDK_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          # Pasang tool pendukung biar gak error tengah jalan
          sudo apt-get update
          sudo apt-get install -y build-essential nasm yasm cmake ninja-build pkg-config
          
          # Mulai ngerakit
          git clone https://github.com/Javernaut/ffmpeg-android-maker.git
          cd ffmpeg-android-maker
          ./ffmpeg-android-maker.sh \
            --target-abis=arm64-v8a \
            --enable-openssl \
            --enable-libx264 \
            --enable-libx265

      - name: Upload Hasil Jadi (.so)
        uses: actions/upload-artifact@v4
        with:
          name: libffmpeg-sakti-abang
          path: ffmpeg-android-maker/output/lib/arm64-v8a/libffmpeg.so
