name: Build APK Clean Test
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: gradle }
      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with: { ndk-version: r25c }
      - run: chmod +x gradlew
      - run: ./gradlew assembleDebug
        env: { ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }} }
      - uses: actions/upload-artifact@v4
        with: { name: APK-Bigo-Final, path: app/build/outputs/apk/debug/*.apk }
